<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Keeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; }
        .card { background-color: #1e293b; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #334155; }
        .btn { transition: all 0.1s ease; border-radius: 8px; font-weight: 800; font-size: 1.1rem; }
        .btn:active { transform: scale(0.92); filter: brightness(1.2); }
        .btn-plus { background-color: #10b981; color: #064e3b; }
        .btn-minus { background-color: #ef4444; color: #ffffff; }
        input { background-color: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen pb-20">

    <header class="text-center py-6">
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">SCORE KEEPER</h1>
    </header>

    <div id="setup" class="card">
        <h2 class="text-xl font-bold mb-4 text-cyan-300">New Game Setup</h2>
        <div id="nameInputs" class="space-y-3 mb-6"></div>
        <div class="flex gap-2 mb-6">
            <button onclick="addPlayerRow()" class="flex-1 bg-slate-700 p-3 rounded-lg text-sm font-bold border border-slate-500">+ Add Player</button>
            <button onclick="clearInputs()" class="p-3 rounded-lg text-sm bg-slate-800 text-slate-400">Clear</button>
        </div>
        <button onclick="startGame()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 p-4 rounded-xl font-black uppercase tracking-widest text-white shadow-xl">Start Match</button>
    </div>

    <div id="gameUI" class="hidden">
        <div id="playerList"></div>

        <div class="grid grid-cols-2 gap-3 mt-4">
            <button onclick="resetScores()" class="bg-slate-800 p-3 rounded-xl font-bold text-slate-300 border border-slate-700">Reset Scores</button>
            <button onclick="showSetup()" class="bg-slate-800 p-3 rounded-xl font-bold text-slate-300 border border-slate-700">New Game</button>
        </div>

        <div class="mt-8">
            <h3 class="text-lg font-bold text-slate-400 mb-4">Session Log</h3>
            <div id="history" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                <p class="text-slate-600 italic text-center">Log clears on refresh.</p>
            </div>
        </div>
    </div>

    <script>
        let players = [];
        let historyData = [];

        function saveState() {
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(players))));
            window.history.replaceState(null, null, "#" + encoded);
        }

        function loadState() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    players = JSON.parse(decodeURIComponent(escape(atob(hash))));
                    render();
                    document.getElementById("setup").classList.add("hidden");
                    document.getElementById("gameUI").classList.remove("hidden");
                } catch (error) {
                    console.error("Load failed", error);
                }
            }
        }

        function addPlayerRow(name = "") {
            const container = document.getElementById("nameInputs");
            const div = document.createElement("div");
            div.innerHTML = `<input type="text" placeholder="Enter Name..." value="${name}" class="name-input mb-2">`;
            container.appendChild(div);
        }

        function clearInputs() {
            document.getElementById("nameInputs").innerHTML = "";
            addPlayerRow();
            addPlayerRow();
        }

        function startGame() {
            const inputs = document.querySelectorAll(".name-input");
            players = Array.from(inputs).map((input, i) => ({
                name: input.value.trim() || `Player ${i + 1}`,
                score: 0
            }));
            if (players.length === 0) return;
            document.getElementById("setup").classList.add("hidden");
            document.getElementById("gameUI").classList.remove("hidden");
            saveState();
            render();
        }

        function showSetup() {
            if (confirm("New game? URL and scores will be reset.")) {
                window.location.hash = "";
                location.reload();
            }
        }

        function updateScore(index, amount) {
            players[index].score += amount;

            const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
            const lastLog = historyData[0];

            if (lastLog && lastLog.pIdx === index) {
                lastLog.val += amount;
                lastLog.time = now;
                lastLog.total = players[index].score;
            } else {
                historyData.unshift({
                    pIdx: index,
                    name: players[index].name,
                    val: amount,
                    time: now,
                    total: players[index].score
                });
            }

            saveState();
            render();
        }

        function resetScores() {
            if (confirm("Reset scores?")) {
                players.forEach((p) => {
                    p.score = 0;
                });
                historyData = [];
                saveState();
                render();
            }
        }

        function render() {
            const list = document.getElementById("playerList");
            list.innerHTML = players.map((p, i) => `
                <div class="card">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xl font-bold text-white">${p.name}</span>
                        <span class="text-4xl font-black text-cyan-400">${p.score}</span>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="updateScore(${i}, -5)" class="btn btn-minus py-3">-5</button>
                        <button onclick="updateScore(${i}, -1)" class="btn btn-minus py-3">-1</button>
                        <button onclick="updateScore(${i}, 1)" class="btn btn-plus py-3">+1</button>
                        <button onclick="updateScore(${i}, 5)" class="btn btn-plus py-3">+5</button>
                    </div>
                </div>
            `).join("");

            const histDiv = document.getElementById("history");
            if (historyData.length > 0) {
                histDiv.innerHTML = historyData.map((h) => `
                    <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-lg border border-slate-800">
                        <div>
                            <span class="font-bold text-cyan-200">${h.name}</span>
                            <span class="mx-2 ${h.val >= 0 ? "text-emerald-400" : "text-red-400"} font-black">
                                ${h.val >= 0 ? "+" : ""}${h.val}
                            </span>
                        </div>
                        <div class="text-right text-[10px] text-slate-500 uppercase font-bold">${h.time}</div>
                    </div>
                `).join("");
            } else {
                histDiv.innerHTML = '<p class="text-slate-600 italic text-center">Log clears on refresh.</p>';
            }
        }

        loadState();
        if (document.getElementById("nameInputs").children.length === 0) {
            addPlayerRow();
            addPlayerRow();
        }
    </script>
</body>
</html>
